tools:
  - class_name: verl.tools.visual_tool.OnlineVisualTool
    config: &online_visual_tool
      base_url: ${oc.env:VISUAL_TOOL_API_BASES,http://127.0.0.1:9000}
      api_key: ${oc.env:VISUAL_TOOL_API_KEY,''}
      timeout: ${oc.env:VISUAL_TOOL_TIMEOUT,300}
      max_retries: ${oc.env:VISUAL_TOOL_MAX_RETRIES,2}
    tool_schema:
      type: function
      function:
        name: crop_zoom
        description: Crop and enlarge a region selected with an absolute pixel bounding box.
        parameters:
          type: object
          properties:
            bbox_2d:
              type: array
              items:
                type: number
              minItems: 4
              maxItems: 4
              description: Absolute image-pixel coordinates [x1, y1, x2, y2].
            target_image:
              type: integer
              description: Zero-based index into the sample images array.
            label:
              type: string
              description: Optional label for the selected region.
            slack_ratio:
              type: number
              minimum: 0
              description: Optional extra context around the bounding box; defaults to 0.
          required: [bbox_2d, target_image]

  - class_name: verl.tools.visual_tool.OnlineVisualTool
    config: *online_visual_tool
    tool_schema:
      type: function
      function:
        name: sam3_segment_multi
        description: Segment one or more target or anchor objects in an image using natural-language queries.
        parameters:
          type: object
          properties:
            queries:
              type: array
              description: Objects to segment. Each entry has role target or anchor and a natural-language query.
            target_image:
              type: integer
              description: Zero-based index into the sample images array.
          required: [queries, target_image]

  - class_name: verl.tools.visual_tool.OnlineVisualTool
    config: *online_visual_tool
    tool_schema:
      type: function
      function:
        name: grounding_detect
        description: Detect boxes for an object in an image using a natural-language query.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: Object or region to detect.
            target_image:
              type: integer
              description: Zero-based index into the sample images array.
          required: [query, target_image]

  - class_name: verl.tools.visual_tool.OnlineVisualTool
    config: *online_visual_tool
    tool_schema:
      type: function
      function:
        name: sam3_crop_zoom
        description: Crop and zoom one target object or region from an image for closer visual inspection.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: Target object or region to crop.
            target_image:
              type: integer
              description: Zero-based index into the sample images array.
            slack_ratio:
              type: number
              description: Extra context around the detected target box.
          required: [query, target_image, slack_ratio]

  - class_name: verl.tools.visual_tool.OnlineVisualTool
    config: *online_visual_tool
    tool_schema:
      type: function
      function:
        name: sam3_crop_zoom_multi
        description: Crop and zoom multiple target objects or regions from an image for closer visual inspection.
        parameters:
          type: object
          properties:
            queries:
              type: array
              description: Targets to crop. Each entry has role target and a natural-language query.
            target_image:
              type: integer
              description: Zero-based index into the sample images array.
            slack_ratio:
              type: number
              description: Extra context around each detected target box.
          required: [queries, target_image, slack_ratio]
